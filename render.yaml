services:
  - type: web
    name: image-server
    runtime: python
    plan: starter          # Cambia a "standard" o superior si necesitas más recursos
    region: oregon         # us-west-2; ajusta según tu preferencia (frankfurt, singapore…)
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /

    envVars:
      - key: IMAGES_DIR
        value: /data/images       # Ruta del disco persistente montado
      - key: MAX_FILE_SIZE_MB
        value: "10"               # Tamaño máximo por imagen en MB
      - key: MAX_WAV_FILE_SIZE_MB
        value: "50"               # Tamaño máximo por WAV en MB
      - key: MAX_MP3_FILE_SIZE_MB
        value: "50"
      - key: MAX_MP4_FILE_SIZE_MB
        value: "200"
      - key: MAX_EXE_FILE_SIZE_MB
        value: "300"
      - key: MAX_COMPRESS_FILE_SIZE_MB
        value: "300"               # RAR, ZIP, 7Z, GZ, BZ2, XZ, TAR
      - key: PYTHON_VERSION
        value: "3.12.0"

    disk:
      name: images-storage
      mountPath: /data/images     # Render monta el disco aquí; los archivos son permanentes
      sizeGB: 50                  # Ajusta el tamaño según tus necesidades (RARs de 300 MB necesitan espacio extra)
